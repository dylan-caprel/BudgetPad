<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Compte temporairement verrouillé — BudgetPAD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { min-height: 100vh; display: flex; align-items: center; background: #F5F5F5; font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body>
    <div class="container">
        <div class="card mx-auto" style="max-width:480px;border-radius:12px;">
            <div class="card-body p-4">
                <h4 class="text-danger"><i class="bi bi-lock-fill"></i> Compte temporairement verrouillé</h4>
                <p>Trop de tentatives de connexion échouées ont été détectées.</p>
                <p class="text-muted" style="font-size:14px;">
                    Pour des raisons de sécurité, l'accès est suspendu pendant
                    1 heure. Contactez votre administrateur si vous estimez
                    qu'il s'agit d'une erreur.
                </p>
                <a href="/" class="btn btn-outline-secondary btn-sm mt-2">Retour à l'accueil</a>
            </div>
        </div>
    </div>
</body>
</html>
