{# Global offcanvas containers — usable from any page via window.openXxxOffcanvas(id). #}

<div class="offcanvas offcanvas-end" tabindex="-1" id="bcDetailOffcanvas"
     data-bs-backdrop="true" data-bs-scroll="false" style="width:460px;">
    <div class="offcanvas-header" style="border-bottom:1px solid #eee;">
        <h6 class="offcanvas-title mb-0" style="color:#1B3A5C;">Détail du bon de commande</h6>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body" id="bcDetailBody"></div>
</div>
